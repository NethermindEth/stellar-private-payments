[build]
target = "app/index.html"
public-url = "/"
dist = "dist"
filehash = false
release = true

[watch]
watch = ["app", "circuits", "sdk/web"]
ignore = ["app/node_modules", "dist", "sdk/web/node_modules"]

[serve]
addresses = ["0.0.0.0"]
port = 8000

[tools]
tailwindcss = "4.1.18"

# Copy static files and stage browser SDK artifacts
[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = ["-c", """
# Compiled circuits ship inside sdk/web/dist/ (npm package). Proving loads them via
# the prover worker's __STELLAR_PRIVATE_PAYMENTS_CIRCUITS_BASE__ (see sdk/web/scripts/build.sh).
if [ ! -f "sdk/web/dist/stellar_private_payments_sdk_web.js" ]; then
    echo "trunk:error: missing sdk/web/dist — run 'make sdk-web-build'" >&2
    exit 1
fi

if [ ! -f "sdk/web/dist/circuits/source-bundle.tar.gz" ]; then
    echo "trunk:error: missing sdk/web/dist/circuits — run 'make sdk-web-build'" >&2
    exit 1
fi

SDK="$TRUNK_STAGING_DIR/js/stellar-private-payments-sdk-web"
mkdir -p "$SDK/dist" "$SDK/js"
cp -R sdk/web/dist/. "$SDK/dist/"

# Bundle SDK JS (inlines @stellar/freighter-api); wasm stays external.
./app/node_modules/.bin/esbuild sdk/web/js/index.js \
  --bundle --format=esm \
  --outfile="$SDK/js/index.js" \
  --external:../dist/stellar_private_payments_sdk_web.js \
  --alias:@stellar/freighter-api=./app/node_modules/@stellar/freighter-api/build/index.min.js

# Static files
cp app/admin.html "$TRUNK_STAGING_DIR/" 2>/dev/null || true
cp app/disclosure.html "$TRUNK_STAGING_DIR/" 2>/dev/null || true

# Top-level legal files (NOTICE, LICENSE, circuits/NOTICE for footer links).
sh deployments/scripts/stage-dist-legal.sh "$TRUNK_STAGING_DIR"

# Footer download link only — same tarball already bundled under SDK dist/circuits/.
cp sdk/web/dist/circuits/source-bundle.tar.gz "$TRUNK_STAGING_DIR/circuits/source-bundle.tar.gz"
"""]

# Bundle JS with esbuild
[[hooks]]
stage = "build"
command = "sh"
command_arguments = ["-c", """
./app/node_modules/.bin/esbuild app/js/ui.js --bundle --external:stellar-private-payments-sdk-web --outfile="$TRUNK_STAGING_DIR/js/ui.js" --format=esm
./app/node_modules/.bin/esbuild app/js/admin.js --bundle --external:stellar-private-payments-sdk-web --outfile="$TRUNK_STAGING_DIR/js/admin.js" --format=esm
./app/node_modules/.bin/esbuild app/js/disclosure.js --bundle --external:stellar-private-payments-sdk-web --outfile="$TRUNK_STAGING_DIR/js/disclosure.js" --format=esm

# Service worker must be served from the root (not bundled with ui.js) so it has full-page scope
cp app/js/sw.js "$TRUNK_STAGING_DIR/sw.js"
"""]
