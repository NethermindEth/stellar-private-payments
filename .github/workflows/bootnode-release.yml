name: Bootnode release

on:
  push:
    tags:
      - "bootnode-v*"

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build -p bootnode --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          BIN="target/${{ matrix.target }}/release/bootnode"
          test -f "$BIN"
          tar -C "$(dirname "$BIN")" -czf "dist/bootnode-${{ matrix.target }}.tar.gz" bootnode
          sha256sum "dist/bootnode-${{ matrix.target }}.tar.gz" > "dist/bootnode-${{ matrix.target }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: bootnode-${{ matrix.target }}
          path: dist/*

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dist -type f -maxdepth 3 -print -exec cp {} out/ \;

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*

  docker:
    name: Docker (multi-arch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tools/bootnode/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/bootnode:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/bootnode:latest

