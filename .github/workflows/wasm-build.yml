name: WASM Build

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wasm-build:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          profile: minimal
          toolchain: stable
          targets: wasm32-unknown-unknown
          override: true

      - name: Cache
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          cache-targets: "true"

      - name: Build circuit artifacts
        run: cargo build -p circuits --release

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked --force

      - name: Setup Node.js
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/web/package-lock.json

      - name: Install SDK npm dependencies
        run: npm ci --prefix sdk/web

      - name: Build npm package
        run: npm run build --prefix sdk/web

      - name: Check SDK artifacts and types
        run: |
          npm run check:artifacts --prefix sdk/web
          npm run check:types --prefix sdk/web

      - name: Check the app wasm build
        run: cargo build -p web --target wasm32-unknown-unknown --release

  wasm-test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          profile: minimal
          toolchain: stable
          targets: wasm32-unknown-unknown
          override: true

      - name: Cache
        uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
        with:
          cache-targets: "true"

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked --force

      - name: Run wasm tests
        run: cargo test --target wasm32-unknown-unknown -p stellar
