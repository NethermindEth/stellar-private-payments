name: Generate policy graph artifact

on:
  push:
    branches: ["witness-graph-runtime"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2
      - name: Install circom
        run: cargo install --git https://github.com/iden3/circom --tag v2.2.3 --package circom
      - name: Generate policy graph
        run: tools/witness-graph/generate-policy-graph.sh target/generated/policy_tx_2_2.graph.bin
      - name: Upload graph artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4
        with:
          name: policy-graph-artifacts
          path: |
            target/generated/policy_tx_2_2.graph.bin
            target/generated/policy_tx_2_2.graph.manifest
          retention-days: 1
