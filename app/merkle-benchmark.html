<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkle Prefix Tree Benchmark</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #101418;
            color: #eef3f8;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #101418;
        }

        main {
            width: min(1040px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(28px, 4vw, 44px);
            line-height: 1;
        }

        p {
            max-width: 760px;
            color: #a9b7c6;
            line-height: 1.6;
        }

        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin: 28px 0;
            padding: 20px;
            border: 1px solid #2a3440;
            border-radius: 8px;
            background: #151b22;
        }

        label {
            display: grid;
            gap: 8px;
            color: #cdd6df;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            box-sizing: border-box;
            width: 100%;
            border: 1px solid #3a4654;
            border-radius: 6px;
            padding: 10px 12px;
            background: #0e1318;
            color: #eef3f8;
            font: inherit;
        }

        button {
            align-self: end;
            border: 0;
            border-radius: 6px;
            padding: 11px 14px;
            background: #4fd1a5;
            color: #06120e;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            cursor: wait;
            opacity: 0.7;
        }

        .status {
            min-height: 24px;
            margin: 8px 0 20px;
            color: #cdd6df;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border: 1px solid #2a3440;
            border-radius: 8px;
            background: #151b22;
        }

        th,
        td {
            padding: 12px 14px;
            border-bottom: 1px solid #2a3440;
            text-align: right;
            white-space: nowrap;
        }

        th:first-child,
        td:first-child {
            text-align: left;
        }

        th {
            color: #a9b7c6;
            font-size: 13px;
            font-weight: 700;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        pre {
            overflow: auto;
            margin-top: 20px;
            padding: 16px;
            border: 1px solid #2a3440;
            border-radius: 8px;
            background: #0e1318;
            color: #cdd6df;
        }
    </style>
</head>
<body>
    <main>
        <h1>Merkle Prefix Tree Benchmark</h1>
        <p>
            Measures the current storage-worker approach in a single-threaded browser WASM runtime:
            construct a prefix tree, build cached levels, and generate membership proofs.
        </p>

        <form id="benchmark-form">
            <label>
                Tree depth
                <input id="depth" type="number" min="1" max="32" value="32">
            </label>
            <label>
                Leaf counts
                <input id="leaf-counts" value="16,64,256,1024,4096,16384">
            </label>
            <label>
                Rounds
                <input id="rounds" type="number" min="1" value="5">
            </label>
            <label>
                Proofs per round
                <input id="proofs" type="number" min="1" value="1">
            </label>
            <button id="run" type="submit">Run benchmark</button>
        </form>

        <div id="status" class="status"></div>
        <table>
            <thead>
                <tr>
                    <th>Leaves</th>
                    <th>new ms</th>
                    <th>build ms</th>
                    <th>proofs ms</th>
                    <th>total ms</th>
                </tr>
            </thead>
            <tbody id="results"></tbody>
        </table>
        <pre id="json" hidden></pre>
    </main>

    <script type="module">
        import init, { benchmarkMerklePrefixTree } from './js/web.js';

        const form = document.getElementById('benchmark-form');
        const status = document.getElementById('status');
        const button = document.getElementById('run');
        const results = document.getElementById('results');
        const json = document.getElementById('json');

        await init();
        status.textContent = 'WASM ready.';

        form.addEventListener('submit', (event) => {
            event.preventDefault();
            button.disabled = true;
            status.textContent = 'Running benchmark...';
            results.replaceChildren();
            json.hidden = true;

            setTimeout(() => {
                try {
                    const depth = numberValue('depth');
                    const rounds = numberValue('rounds');
                    const proofs = numberValue('proofs');
                    const leafCounts = parseLeafCounts(document.getElementById('leaf-counts').value);
                    const report = benchmarkMerklePrefixTree(depth, new Uint32Array(leafCounts), rounds, proofs);

                    for (const row of report.cases) {
                        results.appendChild(resultRow(row));
                    }

                    json.textContent = JSON.stringify(report, null, 2);
                    json.hidden = false;
                    status.textContent = `Done: depth ${report.depth}, ${report.rounds} rounds, ${report.proofsPerRound} proof(s) per round.`;
                } catch (error) {
                    status.textContent = error instanceof Error ? error.message : String(error);
                } finally {
                    button.disabled = false;
                }
            }, 0);
        });

        function numberValue(id) {
            const value = Number(document.getElementById(id).value);
            if (!Number.isSafeInteger(value) || value <= 0) {
                throw new Error(`${id} must be a positive integer`);
            }
            return value;
        }

        function parseLeafCounts(value) {
            const counts = value.split(',').map((part) => {
                const count = Number(part.trim());
                if (!Number.isSafeInteger(count) || count <= 0) {
                    throw new Error('leaf counts must be comma-separated positive integers');
                }
                return count;
            });

            if (counts.length === 0) {
                throw new Error('at least one leaf count is required');
            }

            return counts;
        }

        function resultRow(row) {
            const tr = document.createElement('tr');
            for (const value of [
                row.leaves,
                row.avgNewMs,
                row.avgBuildMs,
                row.avgProofsMs,
                row.avgTotalMs,
            ]) {
                const td = document.createElement('td');
                td.textContent = typeof value === 'number' ? value.toLocaleString(undefined, {
                    maximumFractionDigits: 3,
                }) : value;
                tr.appendChild(td);
            }
            return tr;
        }
    </script>
</body>
</html>
