[package]
name = "witness"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
description = "Circom witness generation via circom-witness-rs operation graphs"

[dependencies]
anyhow = { workspace = true }

# Graph-based witness generation
circom-witness-rs = { workspace = true }
ruint = { workspace = true }
# circom-witness-rs's black box functions use arkworks 0.5 `Fr`
ark-bn254-05 = { package = "ark-bn254", version = "0.5", default-features = false }
ark-ff-05 = { package = "ark-ff", version = "0.5", default-features = false }

# JSON parsing
serde_json = { workspace = true, default-features = false, features = ["alloc", "std"] }
# circom-witness-rs pulls rand -> getrandom 0.2, which needs the "js" feature for web
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { workspace = true, features = ["js"] }

[lints]
workspace = true
