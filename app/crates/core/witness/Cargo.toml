[package]
name = "witness"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
description = "Browser WASM module for Circom witness generation using ark-circom"

[dependencies]
anyhow = { workspace = true }

# Arkworks
ark-bn254 = { workspace = true }
ark-circom = { workspace = true }

# Graph-based witness generation (see issue #192). The runtime evaluator is
# pure Rust; the C++/cxx graph-generation path stays behind the `build-witness`
# feature, which we never enable here.
circom-witness-rs = { workspace = true }
ruint = { workspace = true }
# circom-witness-rs's black box functions use arkworks 0.5 `Fr`
# type, so the bbf closures must use the matching 0.5
# packages instead of the workspace 0.6 arkworks.
ark-bn254-05 = { package = "ark-bn254", version = "0.5", default-features = false }
ark-ff-05 = { package = "ark-ff", version = "0.5", default-features = false }

# BigInt support for input parsing
num-bigint = { workspace = true }

# JSON parsing
serde_json = { workspace = true, default-features = false, features = ["alloc", "std"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ark-circom = { workspace = true, features = ["parallel"] }
# see https://github.com/NethermindEth/stellar-private-payments/issues/192
wasmer = { workspace = true, features = ["cranelift"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
ark-circom = { workspace = true }
wasmer = { workspace = true, features = ["js", "js-default"] }
# circom-witness-rs pulls rand -> getrandom 0.2, which needs the "js" feature
# to build for wasm32-unknown-unknown (issue #192).
getrandom = { workspace = true, features = ["js"] }

[lints]
workspace = true
