[package]
name = "web"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
description = "Unified WASM facade for app crates"

[[bin]]
name = "main_thread"
path = "src/bin/main_thread.rs"

[[bin]]
name = "worker"
path = "src/bin/worker.rs"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
console_error_panic_hook = { workspace = true }
log = { workspace = true }
wasm-log = { workspace = true }
gloo-timers = { version = "0.4", default-features = false, features = ["futures"] }
gloo-worker = { version = "0.6", default-features = false, features = ["futures"]  }
serde = { workspace = true }
serde-wasm-bindgen = { workspace = true }
sqlite-wasm-rs = { version = "0.5.2", default-features = false }
sqlite-wasm-vfs = { version = "0.2.0", default-features = false }
state = { path = "../state" }
wasm-bindgen-futures = { version = "0.4", default-features = false }
wasm-bindgen = { workspace = true }
web-sys = { version = "0.3", features = ["console"] }
stellar = { path = "../stellar" }
types = { path = "../types" }

#[lints]
#workspace = true
