[package]
name = "web"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
publish.workspace = true
description = "Unified WASM facade for app crates"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "storage-worker"
path = "src/bin/storage_worker.rs"

[[bin]]
name = "prover-worker"
path = "src/bin/prover_worker.rs"

[dependencies]
# workspace
stellar-private-payments-sdk = { workspace = true }

# external
anyhow = { workspace = true }
async-trait = { workspace = true }
console_error_panic_hook = { workspace = true }
futures = { workspace = true }
gloo-timers = { workspace = true, features = ["futures"] }
gloo-worker = { workspace = true }
js-sys = { workspace = true }
log = { workspace = true }
serde = { workspace = true }
serde-wasm-bindgen = { workspace = true }
serde_json = { workspace = true, features = ["alloc"] }
sha2 = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
wasm-log = { workspace = true }
web-sys = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies] # only to please clippy, this crate is intended only for WASM
# external
sqlite-wasm-rs = { workspace = true }
sqlite-wasm-vfs = { workspace = true }

[build-dependencies]
# external
sha2 = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
wiremock = { workspace = true }

[lints]
workspace = true
